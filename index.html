<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BLOXSCOPE // Roblox Game Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070b;
    --bg-2: #0d0d14;
    --panel: #11111c;
    --panel-2: #161624;
    --border: #1f1f33;
    --ink: #e8e8f0;
    --ink-dim: #8a8aa3;
    --ink-faint: #4a4a66;
    --accent: #00ff9c;
    --accent-2: #ff2e63;
    --accent-3: #ffd60a;
    --accent-4: #5e5cff;
    --grid: rgba(255,255,255,0.03);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content:'';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 10% 0%, rgba(0,255,156,0.08), transparent 50%),
      radial-gradient(ellipse at 90% 100%, rgba(255,46,99,0.06), transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(94,92,255,0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ============ HEADER ============ */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .logo {
    font-family: 'Major Mono Display', monospace;
    font-size: 32px;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-shadow: 0 0 24px rgba(0,255,156,0.4);
  }
  .logo span { color: var(--accent); }
  .tag {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-left: 1px solid var(--border);
    padding-left: 12px;
  }
  .status {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
    display: inline-block;
    margin-right: 6px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* ============ SEARCH BAR ============ */
  .search-section {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .search-section::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-4), var(--accent-2));
  }
  .search-label {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .search-sub {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .search-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--ink-faint);
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .search-row {
    display: flex;
    gap: 0;
  }
  .search-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 14px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .search-input::placeholder { color: var(--ink-faint); }
  .search-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .search-btn:hover {
    background: var(--ink);
    transform: translateY(-1px);
  }
  .search-btn:disabled {
    opacity: 0.5; cursor: wait;
  }
  .helper {
    margin-top: 12px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .helper code {
    color: var(--accent-3);
    background: rgba(255,214,10,0.08);
    padding: 2px 6px;
    border-radius: 2px;
  }

  /* ============ ERROR ============ */
  .error {
    background: rgba(255,46,99,0.08);
    border: 1px solid var(--accent-2);
    color: var(--accent-2);
    padding: 16px;
    margin-bottom: 24px;
    font-size: 12px;
    letter-spacing: 0.05em;
    display: none;
  }
  .error.show { display: block; }
  .error::before { content: '⚠ '; font-weight: 700; }

  /* ============ LOADING ============ */
  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--ink-dim);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: none;
  }
  .loading.show { display: block; }
  .loading::after {
    content: '';
    display: inline-block;
    width: 0;
    overflow: hidden;
    animation: dots 1.4s steps(4, end) infinite;
    vertical-align: bottom;
  }
  @keyframes dots {
    0% { width: 0; }
    100% { width: 24px; }
  }

  /* ============ RESULTS ============ */
  .results { display: none; }
  .results.show { display: block; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HERO */
  .hero {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  @media (max-width: 800px) { .hero { grid-template-columns: 1fr; } }

  .hero-thumb {
    background: var(--panel);
    border: 1px solid var(--border);
    aspect-ratio: 16/9;
    overflow: hidden;
    position: relative;
  }
  .hero-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .hero-thumb::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(7,7,11,0.7));
    pointer-events: none;
  }

  .hero-info {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 28px;
    position: relative;
  }
  .hero-info .meta-strip {
    display: flex;
    gap: 16px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .hero-info .meta-strip span:not(:last-child)::after {
    content: '/';
    margin-left: 16px;
    color: var(--ink-faint);
  }
  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }
  .hero-creator {
    color: var(--accent);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .hero-creator a { color: inherit; text-decoration: none; border-bottom: 1px dashed var(--accent); }
  .hero-desc {
    color: var(--ink-dim);
    font-size: 12px;
    line-height: 1.7;
    max-height: 100px;
    overflow: auto;
  }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .stat {
    background: var(--panel);
    padding: 20px;
    transition: background 0.2s;
  }
  .stat:hover { background: var(--panel-2); }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.warn { color: var(--accent-3); }
  .stat-value.bad { color: var(--accent-2); }
  .stat-sub {
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  /* SECTIONS */
  .section {
    margin-bottom: 32px;
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .section-meta {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
  }

  /* VOTES */
  .vote-bar {
    height: 8px;
    background: var(--accent-2);
    margin: 16px 0 8px;
    overflow: hidden;
    position: relative;
  }
  .vote-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.8s cubic-bezier(.2,.9,.3,1);
  }
  .vote-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
  }
  .vote-up { color: var(--accent); }
  .vote-down { color: var(--accent-2); }

  /* ICONS GRID */
  .icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .icon-card {
    background: var(--bg);
    border: 1px solid var(--border);
    aspect-ratio: 1;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .icon-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .icon-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th, td {
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  th {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    background: var(--panel-2);
  }
  td.num { font-variant-numeric: tabular-nums; color: var(--accent); }

  /* SERVERS */
  .server-list {
    display: grid;
    gap: 8px;
  }
  .server {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }
  .server-stat {
    display: flex; gap: 24px;
    color: var(--ink-dim);
  }
  .server-stat strong { color: var(--ink); font-weight: 500; }
  .ping { color: var(--accent); }
  .ping.medium { color: var(--accent-3); }
  .ping.high { color: var(--accent-2); }

  /* USER PROFILE */
  .profile-hero {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 28px;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 32px;
  }
  @media (max-width: 700px) {
    .profile-hero { grid-template-columns: 1fr; }
  }
  .profile-avatar {
    background: var(--bg);
    border: 1px solid var(--border);
    aspect-ratio: 1;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-name {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .profile-handle {
    color: var(--accent);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .profile-badges {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--ink-dim);
  }
  .badge.accent { color: var(--accent); border-color: var(--accent); }
  .badge.warn { color: var(--accent-3); border-color: var(--accent-3); }

  .credit {
    text-align: center;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--ink-faint);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="logo">blox<span>scope</span></div>
      <div class="tag">Roblox Intelligence Terminal</div>
    </div>
    <div class="status">
      <span><span class="dot"></span>Live API</span>
      <span id="clock">--:--:--</span>
    </div>
  </header>

  <section class="search-section">
    <div class="search-label">Query Engine</div>
    <div class="search-sub">Pull live stats from Roblox public APIs</div>

    <div class="search-tabs">
      <button class="tab active" data-mode="game">Game</button>
      <button class="tab" data-mode="user">User</button>
      <button class="tab" data-mode="group">Group</button>
    </div>

    <div class="search-row">
      <input id="query" class="search-input" type="text" placeholder="Place ID, Universe ID, or full Roblox URL" />
      <button id="go" class="search-btn">Scan ▸</button>
    </div>
    <div class="helper" id="helper">
      Try: <code>920587237</code> (Adopt Me), <code>2753915549</code> (Blox Fruits), or paste a roblox.com/games/... URL
    </div>
  </section>

  <div id="error" class="error"></div>
  <div id="loading" class="loading">Fetching telemetry</div>

  <main id="results" class="results"></main>

  <div class="credit">// Built with Roblox Public APIs · No login required</div>
</div>

<script>
/* ====================================================================
   BLOXSCOPE — Roblox Stats Tracker
   Uses Roblox public APIs (CORS-enabled) via roproxy.com mirror
   so requests work directly from the browser.
==================================================================== */

const API = {
  // RoProxy mirrors Roblox's APIs with permissive CORS so a static
  // page can call them from the browser. Endpoints mirror exactly.
  games:       'https://games.roproxy.com',
  thumbnails:  'https://thumbnails.roproxy.com',
  users:       'https://users.roproxy.com',
  friends:     'https://friends.roproxy.com',
  groups:      'https://groups.roproxy.com',
  badges:      'https://badges.roproxy.com',
  apis:        'https://apis.roproxy.com',
  presence:    'https://presence.roproxy.com'
};

const $ = (id) => document.getElementById(id);
const fmt = new Intl.NumberFormat('en-US');
const compact = new Intl.NumberFormat('en-US', { notation: 'compact', maximumFractionDigits: 1 });

let mode = 'game';

// Tabs
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    mode = t.dataset.mode;
    const ph = {
      game: 'Place ID, Universe ID, or full Roblox URL',
      user: 'Username or User ID',
      group: 'Group ID'
    };
    const help = {
      game: 'Try: <code>920587237</code> (Adopt Me), <code>2753915549</code> (Blox Fruits)',
      user: 'Try: <code>roblox</code>, <code>builderman</code>, or a numeric user ID',
      group: 'Try: <code>7</code> (Roblox Fan Club) or any group ID'
    };
    $('query').placeholder = ph[mode];
    $('helper').innerHTML = help[mode];
  });
});

$('go').addEventListener('click', run);
$('query').addEventListener('keydown', (e) => { if (e.key === 'Enter') run(); });

// Live clock
function tickClock() {
  const d = new Date();
  $('clock').textContent = d.toUTCString().slice(17, 25) + ' UTC';
}
setInterval(tickClock, 1000); tickClock();

function showError(msg) {
  const e = $('error');
  e.textContent = msg;
  e.classList.add('show');
}
function hideError() { $('error').classList.remove('show'); }
function setLoading(on) { $('loading').classList.toggle('show', on); }
function showResults(html) {
  const r = $('results');
  r.innerHTML = html;
  r.classList.add('show');
}
function clearResults() {
  $('results').classList.remove('show');
  $('results').innerHTML = '';
}

async function fetchJSON(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(`HTTP ${res.status} on ${url}`);
  return res.json();
}

// =============== ROUTER ===============
async function run() {
  const q = $('query').value.trim();
  if (!q) return;
  hideError();
  clearResults();
  setLoading(true);
  $('go').disabled = true;
  try {
    if (mode === 'game') await runGame(q);
    else if (mode === 'user') await runUser(q);
    else if (mode === 'group') await runGroup(q);
  } catch (err) {
    console.error(err);
    showError(err.message || 'Something went wrong while fetching data.');
  } finally {
    setLoading(false);
    $('go').disabled = false;
  }
}

// =============== GAME LOOKUP ===============
function parseGameInput(q) {
  // Match URLs like https://www.roblox.com/games/920587237/Adopt-Me
  const m = q.match(/games?\/(\d+)/i);
  if (m) return { type: 'place', id: m[1] };
  if (/^\d+$/.test(q)) return { type: 'unknown_id', id: q };
  return null;
}

async function runGame(q) {
  const parsed = parseGameInput(q);
  if (!parsed) throw new Error('Could not parse input. Use a Place ID, Universe ID, or full game URL.');

  // First try as Place ID -> resolve to Universe ID
  let universeId;
  try {
    const r = await fetchJSON(`${API.apis}/universes/v1/places/${parsed.id}/universe`);
    universeId = r.universeId;
  } catch (_) { /* maybe it's already a universe id */ }

  if (!universeId) universeId = parsed.id;
  if (!universeId) throw new Error('Unable to resolve to a Universe ID.');

  // Pull everything in parallel
  const [details, votes, icons, thumbs, servers] = await Promise.all([
    fetchJSON(`${API.games}/v1/games?universeIds=${universeId}`).catch(() => null),
    fetchJSON(`${API.games}/v1/games/votes?universeIds=${universeId}`).catch(() => null),
    fetchJSON(`${API.thumbnails}/v1/games/icons?universeIds=${universeId}&size=512x512&format=Png&isCircular=false`).catch(() => null),
    fetchJSON(`${API.thumbnails}/v1/games/multiget/thumbnails?universeIds=${universeId}&size=768x432&format=Png&countPerUniverse=8`).catch(() => null),
    null // servers fetched below if we have a place id
  ]);

  if (!details || !details.data || !details.data.length) throw new Error('Game not found.');
  const g = details.data[0];
  const v = votes && votes.data && votes.data[0];
  const ic = icons && icons.data && icons.data[0];
  const tb = thumbs && thumbs.data && thumbs.data[0];

  const placeId = g.rootPlaceId;
  let serverList = n
